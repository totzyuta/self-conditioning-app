/* ═══ Password Gate ═════════════════════════════════════ */
function PasswordGate({ onAuth }) {
  const [val, setVal]     = useState("");
  const [err, setErr]     = useState(false);
  const [shake, setShake] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  const attempt = () => {
    if (val === PW) {
      try { sessionStorage.setItem(AUTH_K, "1"); } catch {}
      onAuth();
    } else {
      setErr(true);
      setShake(true);
      setVal("");
      setTimeout(() => setShake(false), 400);
      setTimeout(() => setErr(false), 2200);
    }
  };

  const handleKey = e => { if (e.key === "Enter") attempt(); };

  return (

      </div>

      {/* Form box */}
      <div style={{
        width: "100%", maxWidth: 340,
        background: "var(--surface)", border: "1px solid var(--border)",

      }}>
        {/* Avatar */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
          <div style={{
            width: 44, height: 44, borderRadius: "50%",
            background: "var(--green-dim)", border: "1.5px solid var(--green)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 18, fontWeight: 700, color: "var(--green)",
          }}>T</div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)" }}>@totzyu</div>
            <div style={{ fontSize: 10, color: "var(--muted)", letterSpacing: ".06em", marginTop: 2 }}>PERSONAL ACCOUNT</div>
          </div>
        </div>

        <div style={{
          fontSize: 10, letterSpacing: ".14em", color: "var(--muted)",
          textTransform: "uppercase", marginBottom: 10,
        }}>パスワード</div>

        <div className={shake ? "shake" : ""}>
          <input
            ref={inputRef}
            type="password"

            onChange={e => setVal(e.target.value)}

            placeholder="••••••••••"

              width: "100%", border: `1px solid ${err ? "#C4613A" : "var(--border)"}`,

              パスワードが正しくありません

/* ═══ Date helpers ═══════════════════════════════════════ */
const WD_JA = ["日","月","火","水","木","金","土"];
const WD_EN = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const MO_JA = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

function fmtDate(ds) {
  const d = new Date(ds + "T00:00:00");
  return {
    day: d.getDate(),
    month: MO_JA[d.getMonth()],
    year: d.getFullYear(),
    wdJA: WD_JA[d.getDay()],
    wdEN: WD_EN[d.getDay()],
    short: `${d.getMonth()+1}/${d.getDate()}`,
    full: `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`,
    ts: d.getTime(),
  };
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ═══ Smooth SVG Line Chart ══════════════════════════════ */
function SmoothLineChart({ points, w = 640, h = 130, showNeutral = true, color = "#2D5A27" }) {
  // points: [{x: timestamp_ms, y: number, label: string}]
  if (!points || points.length < 1) return null;
  const pad = { t: 18, r: 16, b: 28, l: 32 };
  const iw = w - pad.l - pad.r;
  const ih = h - pad.t - pad.b;

  const xMin = points[0].x, xMax = points[points.length - 1].x;
  const yVals = points.map(p => p.y);
  const yMin = Math.max(0, Math.min(...yVals) - 0.8);
  const yMax = Math.min(10, Math.max(...yVals) + 0.8);
  const yRange = yMax - yMin || 1;
  const xRange = xMax - xMin || 1;

  const toX = v => pad.l + ((v - xMin) / xRange) * iw;
  const toY = v => pad.t + ih - ((v - yMin) / yRange) * ih;

  const pts = points.map(p => ({ ...p, px: toX(p.x), py: toY(p.y) }));

  function catmullRom(arr) {
    if (arr.length < 2) return arr.length === 1 ? `M${arr[0].px},${arr[0].py}` : "";
    // Monotone-friendly tension: low value prevents overshoot between sparse points
    const t = 0.12;
    let d = `M${arr[0].px},${arr[0].py}`;
    for (let i = 0; i < arr.length - 1; i++) {
      const p0 = arr[Math.max(0, i-1)], p1 = arr[i];
      const p2 = arr[i+1], p3 = arr[Math.min(arr.length-1, i+2)];
      const cp1x = p1.px + (p2.px - p0.px) * t;
      const cp1y = p1.py + (p2.py - p0.py) * t;
      const cp2x = p2.px - (p3.px - p1.px) * t;
      const cp2y = p2.py - (p3.py - p1.py) * t;
      d += ` C${cp1x},${cp1y},${cp2x},${cp2y},${p2.px},${p2.py}`;
    }
    return d;
  }

  const linePath = catmullRom(pts);
  const last = pts[pts.length - 1];
  const areaPath = `${linePath} L${last.px},${pad.t+ih} L${pts[0].px},${pad.t+ih} Z`;
  const neutralY = toY(5.0);

  // Y axis labels
  const yLabels = [];
  for (let v = Math.ceil(yMin); v <= Math.floor(yMax); v++) {
    if (v >= 0 && v <= 10) yLabels.push(v);
  }

  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="xMidYMid meet" style={{ display: "block", overflow: "visible" }}>
      {/* Grid lines */}
      {yLabels.map(v => (
        <line key={v} x1={pad.l} y1={toY(v)} x2={pad.l+iw} y2={toY(v)}
          stroke="#E4E1D8" strokeWidth={1} />
      ))}
      {/* Neutral reference */}
      {showNeutral && neutralY >= pad.t && neutralY <= pad.t+ih && (
        <line x1={pad.l} y1={neutralY} x2={pad.l+iw} y2={neutralY}
          stroke="#9B9890" strokeWidth={1} strokeDasharray="4,3" opacity={0.6} />
      )}
      {/* Area */}
      <path d={areaPath} fill={`${color}12`} />
      {/* Line */}
      <path d={linePath} fill="none" stroke={color} strokeWidth={2.5}
        strokeLinecap="round" strokeLinejoin="round" />
      {/* Dots */}
      {pts.map((p, i) => (
        <g key={i}>
          <circle cx={p.px} cy={p.py} r={5} fill={color} stroke="var(--bg)" strokeWidth={2.5} />
          {i === pts.length - 1 && (
            <text x={p.px} y={p.py - 9} textAnchor="middle" fontSize={9}
              fill={color} fontWeight="600">{p.y.toFixed(1)}</text>
          )}
        </g>
      ))}
      {/* Y labels */}
      {yLabels.map(v => (
        <text key={v} x={pad.l - 5} y={toY(v) + 3.5} textAnchor="end"
          fontSize={8} fill="#9B9890">{v}</text>
      ))}
      {/* Neutral label */}
      {showNeutral && neutralY >= pad.t && neutralY <= pad.t+ih && (
        <text x={pad.l + iw + 4} y={neutralY + 3} fontSize={8} fill="#9B9890">±0</text>
      )}
    </svg>
  );
}

      <div style={{
        fontSize: 10, letterSpacing: ".32em", color: "var(--muted)",
        textTransform: "uppercase", marginBottom: 8,
        animation: "fadeDown .4s .05s both",
      }}>
        {d.year} · {d.month}
      </div>

      {/* Giant day number */}
      <div style={{
        fontSize: 120, fontWeight: 100, lineHeight: .9,
        color: "var(--green)", letterSpacing: "-8px",
        fontVariantNumeric: "tabular-nums",
        animation: "countUp .65s .1s cubic-bezier(.22,1,.36,1) both",
      }}>
        {String(d.day).padStart(2, "0")}
      </div>

      {/* Weekday */}
      <div style={{
        marginTop: 14, fontSize: 11, fontWeight: 500,
        letterSpacing: ".25em", color: "var(--muted)", textTransform: "uppercase",
        animation: "fadeUp .4s .3s both",
      }}>
        {d.wdEN}
      </div>

      {/* Divider */}
      <div style={{
        width: 36, height: 1, background: "var(--border)",
        margin: "18px auto 0",
        animation: "fadeIn .5s .45s both",
      }} />
    </div>
  );
}

/* ═══ Condition Orb ══════════════════════════════════════ */
function CondOrb({ value, size = 42 }) {
  const c = condColor(value);
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `${c}18`, border: `1.5px solid ${c}50`,
      display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
    }}>
      <span style={{
        fontSize: size * 0.26, fontWeight: 700, color: c,
        fontVariantNumeric: "tabular-nums", letterSpacing: "-0.5px",
      }}>
        {value != null ? value.toFixed(1) : "—"}
      </span>
    </div>
  );
}

/* ═══ OS Bar ═════════════════════════════════════════════ */
function OSBar({ value }) {
  const pct = (value / 10) * 100;
  const c = condColor(value);
  const diff = value - 5.0;
  return (
    <div>
      <div style={{
        display: "flex", justifyContent: "space-between",
        fontSize: 9, color: "var(--muted)", letterSpacing: "0.08em", marginBottom: 8,
      }}>
        <span>0</span><span>NEUTRAL  5.0</span><span>10</span>
      </div>
      <div style={{ height: 4, background: "var(--border)", borderRadius: 2, position: "relative" }}>
        <div style={{
          position: "absolute", left: 0, top: 0, bottom: 0,
          width: `${pct}%`, borderRadius: 2,
          background: `linear-gradient(to right, var(--border) 50%, ${c} 50%)`,
          transition: "width .7s cubic-bezier(.34,1.56,.64,1)",
        }} />
        <div style={{
          position: "absolute", left: "50%", top: -5, bottom: -5,
          width: 1.5, background: "var(--muted)", opacity: .45, transform: "translateX(-50%)",
        }} />
        <div style={{
          position: "absolute", left: `${pct}%`, top: "50%",
          transform: "translate(-50%,-50%)",
          width: 13, height: 13, borderRadius: "50%",
          background: c, border: "2.5px solid var(--bg)",
          boxShadow: `0 0 0 1.5px ${c}60`,
          transition: "left .7s cubic-bezier(.34,1.56,.64,1)",
        }} />
      </div>
      <div style={{ marginTop: 10, textAlign: "center", fontSize: 10, color: "var(--muted)", letterSpacing: "0.07em" }}>
        OS DELTA:{" "}
        <span style={{ color: c, fontWeight: 700 }}>{diff >= 0 ? "+" : ""}{diff.toFixed(1)}</span>
        <span style={{ margin: "0 8px", opacity: .4 }}>·</span>
        <span style={{ color: c }}>{condLabel(value)}</span>
      </div>
    </div>
  );
}

/* ═══ Dashboard ══════════════════════════════════════════ */
function Dashboard({ logs }) {
  const sorted = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
  const latest = sorted[0];

  if (!latest) return (
    <div style={{ textAlign: "center", padding: "80px 24px", color: "var(--muted)" }}>
      <p>まだデータがありません。「記録」タブから追加してください。</p>
    </div>
  );

  const d = fmtDate(latest.date);
  const c = condColor(latest.condition);

  // Trend data (last 10 with condition)
  const trendData = sorted
    .filter(l => l.condition != null)
    .slice(0, 10)
    .reverse()
    .map(l => ({ x: new Date(l.date + "T00:00:00").getTime(), y: l.condition, label: fmtDate(l.date).short }));

  const isRest = latest.type === "rest";

  return (
    <div style={{ padding: "40px 24px 48px" }}>

      {/* ── Centered Date Hero ── */}
      <DateHero dateStr={latest.date} />

      {/* ── Condition Number ── */}
      <div style={{
        textAlign: "center", marginTop: 32, marginBottom: 8,
        animation: "fadeUp .5s .55s both",
      }}>
        <div style={{ fontSize: 10, letterSpacing: ".28em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 12 }}>
          Condition
        </div>
        <div style={{
          fontSize: 88, fontWeight: 100, color: c,
          lineHeight: 1, letterSpacing: "-6px",
          fontVariantNumeric: "tabular-nums",
          animation: "countUp .6s .6s cubic-bezier(.22,1,.36,1) both",
        }}>
          {latest.condition != null ? latest.condition.toFixed(1) : "—"}
        </div>
        {latest.condition != null && (
          <div style={{
            display: "flex", gap: 8, alignItems: "center", justifyContent: "center", marginTop: 10,
            animation: "fadeUp .4s .75s both",
          }}>
            <span style={{
              padding: "4px 12px", borderRadius: 100,
              background: `${c}15`, color: c,
              fontSize: 11, fontWeight: 700,
              border: `1px solid ${c}28`,
            }}>
              {latest.condition >= 5 ? "+" : ""}{(latest.condition - 5).toFixed(1)} OS
            </span>
            <span style={{ fontSize: 11, color: "var(--muted)" }}>{condLabel(latest.condition)}</span>
          </div>
        )}

      {/* OS Bar */}
      {latest.condition != null && (
        <div style={{ marginBottom: 36, animation: "fadeUp .4s .85s both" }}>
          <OSBar value={latest.condition} />

      {/* Latest Session Card */}
      <div style={{
        background: "var(--surface)", border: "1px solid var(--border)",
        borderRadius: 10, padding: "22px 22px 18px", marginBottom: 16,

        <div style={{
          fontSize: 9, letterSpacing: ".18em", color: "var(--muted)",

          <>

            {latest.mainWorkout && latest.mainWorkout !== "—" && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 9, letterSpacing: ".15em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 8 }}>Main</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 16, fontWeight: 700, color: "var(--green)" }}>{latest.mainWorkout}</span>
                  <span style={{ fontSize: 13, color: "var(--muted)", fontVariantNumeric: "tabular-nums" }}>{latest.weightRepSet}</span>
                </div>
              </div>

            {/* Sub — same design as main */}

              <div style={{ borderTop: "1px solid #F2EFE8", paddingTop: 12 }}>
                <div style={{ fontSize: 9, letterSpacing: ".15em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 8 }}>Sub</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>

            <span>{trendData[0].label}</span>
            <span>{trendData[trendData.length-1].label}</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ Condition Tab ══════════════════════════════════════ */
const PERIODS = [
  { key: "1w", label: "1週間", days: 7 },
  { key: "1m", label: "1ヶ月", days: 30 },
  { key: "3m", label: "3ヶ月", days: 90 },
  { key: "6m", label: "6ヶ月", days: 180 },
  { key: "1y", label: "1年",   days: 365 },
];

function ConditionTab({ logs, onUpdateCondition }) {
  const [period, setPeriod] = useState("1m");
  const [date, setDate]     = useState(todayISO());
  const [cond, setCond]     = useState(5.0);
  const [saved, setSaved]   = useState(false);

  // Sync slider when date changes
  useEffect(() => {
    const found = logs.find(l => l.date === date);
    if (found && found.condition != null) {
      setCond(found.condition);
    } else {
      setCond(5.0);
    }
  }, [date, logs]);

  const periodDays = PERIODS.find(p => p.key === period).days;
  const cutoff = Date.now() - periodDays * 86400000;

  const chartPoints = useMemo(() => {
    return logs
      .filter(l => l.condition != null && new Date(l.date + "T00:00:00").getTime() >= cutoff)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .map(l => ({
        x: new Date(l.date + "T00:00:00").getTime(),
        y: l.condition,
        label: fmtDate(l.date).short,
      }));
  }, [logs, period]);

  // Find existing entry for selected date
  const existing = logs.find(l => l.date === date);
  const existingCond = existing ? existing.condition : null;

  const handleSave = () => {
    onUpdateCondition(date, parseFloat(cond));
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const cv = parseFloat(cond);
  const cc = condColor(cv);
  const pct = (cv / 10) * 100;

  // Summary stats for period
  const withCond = chartPoints.map(p => p.y);
  const avg = withCond.length ? (withCond.reduce((a,b) => a+b, 0) / withCond.length) : null;
  const maxV = withCond.length ? Math.max(...withCond) : null;
  const minV = withCond.length ? Math.min(...withCond) : null;

  return (
    <div className="fade-up" style={{ padding: "28px 24px 56px" }}>

      {/* Graph section */}
      <div style={{
        background: "var(--surface)", border: "1px solid var(--border)",
        borderRadius: 10, padding: "20px 20px 12px", marginBottom: 24,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".03em" }}>
            コンディション推移
          </div>
          {/* Period selector */}
          <div style={{ display: "flex", gap: 2 }}>
            {PERIODS.map(p => (
              <button key={p.key} onClick={() => setPeriod(p.key)} style={{
                background: period === p.key ? "var(--green)" : "none",
                color: period === p.key ? "#fff" : "var(--muted)",
                border: "1px solid",
                borderColor: period === p.key ? "var(--green)" : "var(--border)",
                borderRadius: 4, padding: "4px 8px",
                fontSize: 10, fontWeight: 600, letterSpacing: ".05em",
                transition: "all .15s",
              }}>
                {p.label}
              </button>
            ))}
          </div>
        </div>

        {chartPoints.length >= 2 ? (
          <>
            <SmoothLineChart points={chartPoints} h={140} showNeutral={true} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--muted)", marginTop: 4, padding: "0 30px" }}>
              <span>{chartPoints[0].label}</span>
              <span>{chartPoints[chartPoints.length-1].label}</span>
            </div>
            {/* Stats */}
            <div style={{ display: "flex", gap: 0, borderTop: "1px solid var(--border)", marginTop: 14 }}>
              {[
                { label: "平均", val: avg != null ? avg.toFixed(2) : "—" },
                { label: "最高", val: maxV != null ? maxV.toFixed(1) : "—" },
                { label: "最低", val: minV != null ? minV.toFixed(1) : "—" },
                { label: "記録数", val: withCond.length },
              ].map((s, i) => (
                <div key={i} style={{
                  flex: 1, textAlign: "center", padding: "12px 8px",
                  borderRight: i < 3 ? "1px solid var(--border)" : "none",
                }}>
                  <div style={{ fontSize: 9, color: "var(--muted)", letterSpacing: ".1em", marginBottom: 4 }}>{s.label}</div>
                  <div style={{ fontSize: 16, fontWeight: 300, color: "var(--green)", letterSpacing: "-0.5px" }}>{s.val}</div>
                </div>
              ))}
            </div>
          </>
        ) : (
          <div style={{ textAlign: "center", padding: "40px 0", color: "var(--muted)", fontSize: 13 }}>
            この期間のコンディションデータがありません
          </div>
        )}
      </div>

      {/* Record section */}
      <div style={{
        background: "var(--surface)", border: "1px solid var(--border)",
        borderRadius: 10, padding: "22px",
      }}>
        <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".03em", marginBottom: 22 }}>
          コンディションを記録
        </div>

        {/* Date */}
        <div style={{ marginBottom: 24 }}>
          <div style={LABEL_S}>日付</div>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          {existingCond != null && (
            <div style={{ marginTop: 6, fontSize: 11, color: "var(--muted)" }}>
              この日の記録: <span style={{ color: condColor(existingCond), fontWeight: 700 }}>{existingCond.toFixed(1)}</span>（上書き可）
            </div>
          )}
        </div>

        {/* Slider */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ ...LABEL_S, display: "flex", alignItems: "baseline", gap: 10 }}>
            <span>コンディション</span>
            <span style={{ fontSize: 26, fontWeight: 100, color: cc, letterSpacing: "-1.5px", fontVariantNumeric: "tabular-nums" }}>
              {cv.toFixed(1)}
            </span>
            <span style={{ fontSize: 10, color: cc, fontWeight: 700, padding: "2px 8px", borderRadius: 100, background: `${cc}15`, border: `1px solid ${cc}30` }}>
              {cv >= 5 ? "+" : ""}{(cv-5).toFixed(1)} OS
            </span>
          </div>
          <div style={{ padding: "10px 0" }}>
            <input type="range" min="0" max="10" step="0.1"
              value={cond}
              onChange={e => setCond(e.target.value)}
              style={{ background: `linear-gradient(to right, ${cc} ${pct}%, var(--border) ${pct}%)` }}
            />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--muted)", marginTop: 5 }}>
              <span>0  LOW</span>
              <span>◆ NEUTRAL 5.0</span>
              <span>HIGH  10</span>
            </div>
          </div>
        </div>

        <button onClick={handleSave} style={{
          width: "100%", padding: "13px",
          background: saved ? "var(--green)" : "var(--terra)",
          color: "#fff", border: "none", borderRadius: 7,
          fontSize: 14, fontWeight: 600, letterSpacing: ".06em",
          transition: "background .35s",
          boxShadow: `0 3px 12px ${saved ? "rgba(45,90,39,.25)" : "rgba(196,97,58,.25)"}`,
        }}>
          {saved ? "✓  保存しました" : "記録する"}
        </button>
      </div>
    </div>
  );
}

/* ═══ History / Notes Tab ════════════════════════════════ */
const FILTERS = [
  { key: "all",      label: "全て" },
  { key: "training", label: "トレーニング" },
  { key: "rest",     label: "休息" },
];

function History({ logs }) {
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState(new Set());

  const sorted = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));

  const filtered = sorted.filter(l => {
    if (filter === "all")      return true;
    if (filter === "training") return l.type === "training";
    if (filter === "rest")     return l.type === "rest";
    return true;
  });

  const toggle = id => setExpanded(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  });

  return (
    <div className="fade-up" style={{ paddingBottom: 48 }}>
      <div style={{ padding: "24px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h2 style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".05em" }}>トレーニングノート</h2>
        <span style={{ fontSize: 11, color: "var(--muted)" }}>{filtered.length} entries</span>
      </div>

      {/* Filter */}
      <div style={{ display: "flex", gap: 6, padding: "14px 24px", overflowX: "auto" }}>
        {FILTERS.map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{
            background: filter === f.key ? "var(--green)" : "none",
            color: filter === f.key ? "#fff" : "var(--muted)",
            border: "1px solid",
            borderColor: filter === f.key ? "var(--green)" : "var(--border)",
            borderRadius: 100, padding: "5px 14px",
            fontSize: 11, fontWeight: 600, whiteSpace: "nowrap",
            transition: "all .15s",
          }}>
            {f.label}
          </button>
        ))}
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{ minWidth: 580 }}>
          <thead>
            <tr>
              <th style={{ width: 64 }}>日付</th>
              <th style={{ width: 52 }}>状態</th>
              <th style={{ width: 70 }}>種別</th>
              <th>メイン種目</th>
              <th style={{ width: 100 }}>サブ種目</th>
              <th style={{ width: 140 }}>備考</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((log, idx) => {
              const d = fmtDate(log.date);
              const isExp = expanded.has(log.id);
              const hasNote = log.remarks && log.remarks.length > 0;
              const isLong = log.remarks && log.remarks.length > 28;

              return (
                <tr key={log.id} style={{ animation: `rowIn .3s ease ${Math.min(idx,8)*.04}s both` }}>
                  <td>
                    <div style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700, fontSize: 13 }}>{d.short}</div>
                    <div style={{ fontSize: 10, color: "var(--muted)", marginTop: 1 }}>{d.wdJA}</div>
                  </td>
                  <td style={{ paddingTop: 11, paddingBottom: 11 }}>
                    <CondOrb value={log.condition} size={40} />
                  </td>
                  <td>
                    <span style={{
                      display: "inline-block",
                      fontSize: 10, padding: "3px 8px", borderRadius: 100,
                      background: log.type === "training" ? "var(--green-dim)" : "#F5F3EF",
                      color: log.type === "training" ? "var(--green)" : "var(--muted)",
                      fontWeight: 600, letterSpacing: ".05em", whiteSpace: "nowrap",
                    }}>
                      {log.type === "training" ? "運動" : "休息"}
                    </span>
                  </td>
                  <td>
                    {log.mainWorkout && log.mainWorkout !== "—" ? (
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 12, color: "var(--green)" }}>{log.mainWorkout}</div>
                        {log.weightRepSet && log.weightRepSet !== "—" && (
                          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2, fontVariantNumeric: "tabular-nums" }}>{log.weightRepSet}</div>
                        )}
                      </div>
                    ) : <span style={{ color: "#D0CDC5" }}>—</span>}
                  </td>
                  <td>
                    {log.subWorkout && log.subWorkout !== "—" && log.subWorkout !== "なし" ? (
                      <span style={{ fontSize: 11, color: "#666" }}>{log.subWorkout}</span>
                    ) : <span style={{ color: "#D0CDC5", fontSize: 11 }}>—</span>}
                  </td>
                  <td>
                    {hasNote ? (
                      <div onClick={() => isLong && toggle(log.id)} style={{ cursor: isLong ? "pointer" : "default" }}>
                        <div style={{
                          fontSize: 11, color: "#555", lineHeight: 1.65,
                          display: isExp ? "block" : "-webkit-box",
                          WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden",
                        }}>
                          {isExp ? log.remarks : log.remarks}
                        </div>
                        {isLong && (
                          <div style={{ fontSize: 9, color: "var(--terra)", marginTop: 2 }}>
                            {isExp ? "▲ 閉じる" : "▼ 展開"}
                          </div>
                        )}
                      </div>
                    ) : <span style={{ color: "#D0CDC5", fontSize: 11 }}>—</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══ Style helpers ══════════════════════════════════════ */
const LABEL_S = {
  display: "block", fontSize: 10, letterSpacing: ".15em",
  color: "var(--muted)", textTransform: "uppercase", marginBottom: 10,
};

function AddBtn({ onClick, label }) {
  return (
    <button type="button" onClick={onClick} style={{
      background: "none", border: "1px dashed #C8C4BC", color: "var(--muted)",
      padding: "6px 14px", borderRadius: 6, fontSize: 11, letterSpacing: ".05em",
      transition: "all .15s",
    }}
      onMouseEnter={e => { e.currentTarget.style.borderColor="var(--green)"; e.currentTarget.style.color="var(--green)"; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor="#C8C4BC"; e.currentTarget.style.color="var(--muted)"; }}
    >{label}</button>
  );
}

/* ═══ Record Form ════════════════════════════════════════ */
function RecordForm({ onSubmit, logs }) {
  const [type, setType]   = useState("training");
  const [date, setDate]   = useState("2026-04-12");
  const [cond, setCond]   = useState(5.0);

  // Sync slider when date changes
  useEffect(() => {
    const found = logs.find(l => l.date === date);
    if (found && found.condition != null) {
      setCond(found.condition);
    } else {
      setCond(5.0);
    }
  }, [date, logs]);
  const [mainExs, setMainExs] = useState([{ name: "", weight: "", reps: "" }]);
  const [subExs, setSubExs]   = useState([{ name: "", weight: "", reps: "" }]);
  const [note, setNote]   = useState("");
  const [saved, setSaved] = useState(false);

  const updMain = (i, k, v) => setMainExs(a => { const n=[...a]; n[i]={...n[i],[k]:v}; return n; });
  const updSub  = (i, k, v) => setSubExs(a  => { const n=[...a]; n[i]={...n[i],[k]:v}; return n; });

  const buildExStr = (exs) => exs.filter(e=>e.name.trim()).map(e=>{
    const parts = [e.name.trim()];
    if (e.weight.trim()) parts.push(e.weight.trim());
    if (e.reps.trim()) parts.push(`(${e.reps.trim()})`);
    return parts.join(" ");
  }).join(" / ");

  const handleSubmit = (e) => {
    e.preventDefault();
    const mainStr = type === "training" ? (buildExStr(mainExs) || "—") : "休息";
    const subStr  = type === "training" ? (buildExStr(subExs)  || "—") : "—";

    // Build weightRepSet from main exercises
    const wrs = type === "training"
      ? mainExs.filter(ex=>ex.name.trim()).map(ex=>`${ex.weight} (${ex.reps})`).join(" / ")
      : "—";

    onSubmit({
      id: Date.now().toString(),
      date, condition: parseFloat(cond),
      type,
      mainWorkout: mainStr,
      weightRepSet: wrs || "—",
      subWorkout: subStr,
      remarks: note,
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    setMainExs([{ name: "", weight: "", reps: "" }]);
    setSubExs([{ name: "", weight: "", reps: "" }]);
    setNote("");
  };

  const cv = parseFloat(cond);
  const cc = condColor(cv);
  const pct = (cv / 10) * 100;

  return (
    <div className="fade-up" style={{ padding: "28px 24px 56px" }}>
      <h2 style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".05em", marginBottom: 28 }}>新しい記録</h2>
      <form onSubmit={handleSubmit}>

        {/* Type toggle */}
        <div style={{ marginBottom: 28 }}>
          <div style={LABEL_S}>種別</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[["training","トレーニング"],["rest","休息"]].map(([k,l]) => (
              <button key={k} type="button" onClick={() => setType(k)} style={{
                flex: 1, padding: "12px",
                background: type === k ? (k === "training" ? "var(--green)" : "var(--terra)") : "var(--surface)",
                color: type === k ? "#fff" : "var(--muted)",
                border: `1px solid ${type === k ? (k === "training" ? "var(--green)" : "var(--terra)") : "var(--border)"}`,
                borderRadius: 8, fontSize: 14, fontWeight: 600,
                transition: "all .2s",
              }}>
                {k === "training" ? "💪 " : "🌿 "}{l}
              </button>
            ))}
          </div>
        </div>

        {/* Date */}
        <div style={{ marginBottom: 24 }}>
          <div style={LABEL_S}>日付</div>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} required />
        </div>

        {/* Condition — common */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ ...LABEL_S, display: "flex", alignItems: "baseline", gap: 10 }}>
            <span>コンディション</span>
            <span style={{ fontSize: 26, fontWeight: 100, color: cc, letterSpacing: "-1.5px", fontVariantNumeric: "tabular-nums" }}>
              {cv.toFixed(1)}
            </span>
            <span style={{ fontSize: 10, color: cc, fontWeight: 700, padding: "2px 8px", borderRadius: 100, background: `${cc}15`, border: `1px solid ${cc}30` }}>
              {cv >= 5 ? "+" : ""}{(cv-5).toFixed(1)} OS
            </span>
          </div>
          <div style={{ padding: "10px 0" }}>
            <input type="range" min="0" max="10" step="0.1"
              value={cond} onChange={e => setCond(e.target.value)}
              style={{ background: `linear-gradient(to right, ${cc} ${pct}%, var(--border) ${pct}%)` }}
            />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--muted)", marginTop: 5 }}>
              <span>0  LOW</span><span>◆ NEUTRAL 5.0</span><span>HIGH  10</span>
            </div>
          </div>
        </div>

        {/* Training-only inputs */}
        {type === "training" && (
          <>
            {/* Main exercises */}
            <div style={{ marginBottom: 22 }}>
              <div style={LABEL_S}>メイン種目</div>
              {mainExs.map((ex, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 76px 100px", gap: 6, marginBottom: 6 }}>
                  <input type="text" placeholder="種目名 (例: BP)" value={ex.name} onChange={e => updMain(i,"name",e.target.value)} />
                  <input type="text" placeholder="重量" value={ex.weight} onChange={e => updMain(i,"weight",e.target.value)} />
                  <input type="text" placeholder="回数 7,6,4" value={ex.reps} onChange={e => updMain(i,"reps",e.target.value)} />
                </div>
              ))}
              <AddBtn onClick={() => setMainExs(a => [...a, {name:"",weight:"",reps:""}])} label="+ 種目を追加" />
            </div>

            {/* Sub exercises */}
            <div style={{ marginBottom: 22 }}>
              <div style={LABEL_S}>サブ種目</div>
              {subExs.map((ex, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 76px 100px", gap: 6, marginBottom: 6 }}>
                  <input type="text" placeholder="種目名 (例: DBP)" value={ex.name} onChange={e => updSub(i,"name",e.target.value)} />
                  <input type="text" placeholder="重量" value={ex.weight} onChange={e => updSub(i,"weight",e.target.value)} />
                  <input type="text" placeholder="回数 9,8,7" value={ex.reps} onChange={e => updSub(i,"reps",e.target.value)} />
                </div>
              ))}
              <AddBtn onClick={() => setSubExs(a => [...a, {name:"",weight:"",reps:""}])} label="+ 種目を追加" />
            </div>
          </>
        )}

        {/* Note */}
        <div style={{ marginBottom: 32 }}>
          <div style={LABEL_S}>メモ・備考</div>
          <textarea placeholder="気づいたこと、体の状態など..." value={note} onChange={e => setNote(e.target.value)} />
        </div>

        <button type="submit" style={{
          width: "100%", padding: "14px",
          background: saved ? "var(--green)" : "var(--terra)",
          color: "#fff", border: "none", borderRadius: 7,
          fontSize: 14, fontWeight: 600, letterSpacing: ".07em",
          transition: "background .35s",
          boxShadow: `0 3px 14px ${saved ? "rgba(45,90,39,.25)" : "rgba(196,97,58,.25)"}`,
        }}>
          {saved ? "✓  記録しました" : "記録する"}
        </button>
      </form>
    </div>
  );
}

/* ═══ App Shell ══════════════════════════════════════════ */
const TABS = [
  { id: "dashboard",  label: "ダッシュボード" },
  { id: "condition",  label: "コンディション" },
  { id: "history",    label: "ノート" },
  { id: "record",     label: "記録" },
];

function App() {
  const [authed, setAuthed] = useState(() => {
    try { return sessionStorage.getItem(AUTH_K) === "1"; } catch { return false; }
  });
  const [logs, setLogs] = useState(() => {
    try { const s = localStorage.getItem(SK); if (s) return JSON.parse(s); } catch {}
    return INITIAL_LOGS;
  });
  const [tab, setTab] = useState("dashboard");

  if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;

  useEffect(() => {
    try { localStorage.setItem(SK, JSON.stringify(logs)); } catch {}
  }, [logs]);

  const addLog = useCallback(log => {
    setLogs(prev => {
      const idx = prev.findIndex(l => l.date === log.date);
      if (idx >= 0) { const n=[...prev]; n[idx]=log; return n; }
      return [...prev, log];
    });
    setTab("history");
  }, []);

  const updateCondition = useCallback((date, value) => {
    setLogs(prev => {
      const idx = prev.findIndex(l => l.date === date);
      if (idx >= 0) {
        const n = [...prev]; n[idx] = { ...n[idx], condition: value }; return n;
      }
      return [...prev, {
        id: `cond_${date}_${Date.now()}`,
        date, condition: value, type: "rest",
        mainWorkout: "—", weightRepSet: "—", subWorkout: "—", remarks: "",
      }];
    });
  }, []);

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", minHeight: "100vh" }}>

      {/* Header */}
      <header style={{
        padding: "20px 24px 0",
        borderBottom: "1px solid var(--border)",
        position: "sticky", top: 0,
        background: "var(--bg)", zIndex: 10,
      }}>
        {/* Title row + user */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: ".28em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 3 }}>
              PERSONAL HEALTH LOG
            </div>
            <h1 style={{ fontSize: 17, fontWeight: 300, color: "var(--green)", letterSpacing: ".01em" }}>
              Self Conditioning App
            </h1>
          </div>
          {/* User badge */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
            <div style={{
              width: 30, height: 30, borderRadius: "50%",
              background: "var(--green-dim)", border: "1.5px solid var(--green)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 12, fontWeight: 700, color: "var(--green)",
              letterSpacing: "0",
            }}>T</div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text)", letterSpacing: ".01em" }}>@totzyu</div>
              <div style={{ fontSize: 9, color: "var(--muted)", letterSpacing: ".06em", marginTop: 1 }}>ACTIVE</div>
            </div>
          </div>
        </div>

        {/* Tab nav — no scroll */}
        <nav style={{ display: "flex", overflow: "hidden" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              background: "none", border: "none", flex: 1,
              borderBottom: tab === t.id ? "2.5px solid var(--green)" : "2.5px solid transparent",
              padding: "8px 4px", fontSize: 11,
              color: tab === t.id ? "var(--green)" : "var(--muted)",
              fontWeight: tab === t.id ? 700 : 400,
              letterSpacing: ".01em", marginBottom: -1,
              transition: "color .2s,border-color .2s",
              whiteSpace: "nowrap",
            }}>
              {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main>
        {tab === "dashboard" && <Dashboard key="db" logs={logs} />}
        {tab === "condition" && <ConditionTab key="cond" logs={logs} onUpdateCondition={updateCondition} />}
        {tab === "history"   && <History key="hist" logs={logs} />}
        {tab === "record"    && <RecordForm key="rec" onSubmit={addLog} logs={logs} />}
      </main>

      <footer style={{
        padding: "24px", textAlign: "center",
        borderTop: "1px solid var(--border)",
        fontSize: 9, color: "#D0CDC5", letterSpacing: ".15em",
      }}>
        SELF CONDITIONING APP  ·  OS SYSTEM  5.0 NEUTRAL
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
